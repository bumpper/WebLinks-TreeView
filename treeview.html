<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TreeView</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #fafafa; }
        .tree-placeholder {
            padding: 2em;
            color: #555;
            text-align: center;
        }
        body.dark-mode {
            background-color: #333;
            color: #fff;
        }
        .dark-mode .tree-placeholder {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="tree-placeholder">
        <h2>TreeView Placeholder</h2>
        <p>This is where your bookmarks tree will appear.</p>
    </div>
    <script>
        // Sync dark mode with localStorage (set by preview.html)
        const body = document.body;
        function applyDarkMode() {
            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            if (isDarkMode) {
                body.classList.add('dark-mode');
            } else {
                body.classList.remove('dark-mode');
            }
            console.log('Dark mode applied:', isDarkMode);
        }
        applyDarkMode();
        // Listen for changes in localStorage to update mode live if both pages are open
        window.addEventListener('storage', function(e) {
            if (e.key === 'darkMode') {
                console.log('Storage event detected. New value:', e.newValue);
                applyDarkMode();
            }
        });
    </script>
</body>
</html>
